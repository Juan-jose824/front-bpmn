<div class="history-container">
  <div class="history-card">
    
    <div class="header-section">
      <div class="card-header">
        <h1 style="margin:0; font-size: 1.5rem;">Historial de Análisis</h1>
        <p style="margin:5px 0 0; color: #666;">Gestiona tus diagramas generados</p>
      </div>

      <div class="bulk-actions" *ngIf="getSelectedCount() > 0" style="margin-top: 15px;">
        <button class="btn-delete-bulk" (click)="eliminarSeleccionados()" 
                style="background: #ffeded; color: #d32f2f; border: 1px solid #ffcdd2; padding: 8px 12px; border-radius: 6px; cursor: pointer;">
          🗑️ Eliminar {{ getSelectedCount() }} seleccionados
        </button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="documents-list" *ngIf="documents.length > 0">
      <div *ngFor="let doc of documents" 
           class="history-item-row" 
           [class.is-selected]="doc.selected">
        
        <div class="left-section">
          <input type="checkbox" [(ngModel)]="doc.selected" style="width: 18px; height: 18px; cursor: pointer;">
          <div class="info">
            <span class="file-title">{{ doc.file_name }}</span>
            <span class="date">{{ (doc.fecha_creacion || doc.date) | date:'dd/MM/yyyy HH:mm' }}</span>
          </div>
        </div>

        <div class="right-section">
          <button class="btn-download" (click)="descargarDesdeHistorial(doc.bpmn_xml, doc.file_name)">
            📥 Descargar
          </button>
        </div>
      </div>
    </div>

    <div class="empty-state" *ngIf="documents.length === 0" style="text-align: center; padding: 40px;">
      <p style="color: #999;">No hay documentos registrados.</p>
    </div>

  </div>
</div>
