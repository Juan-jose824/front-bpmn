<form class="login-form" [formGroup]="loginForm" (ngSubmit)="onLogin()">
    
    <div class="logo-container">
        <img src="img/dgitg.png" alt="Logo Empresa" class="login-logo">
    </div>

    <div class="form-group">
        <label>Correo*</label>
        <input type="email" formControlName="email">
    </div>

    <div class="form-group">
        <label>Contraseña*</label>
        <div class="password-wrapper">
            <input [type]="hide ? 'password' : 'text'" formControlName="pass">
            <span class="eye-icon" (click)="togglePassword()">👁</span>
        </div>
    </div>

    <button type="submit" 
            class="btn-login" 
            [disabled]="loginForm.invalid">
        Iniciar Sesión
    </button>
</form>
